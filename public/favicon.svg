<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer rounded container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Stylized Aero CRM Logo - Dynamic Wing and CRM Connections -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Wing curve representing Aero -->
    <path d="M120 300 L240 80 L300 80 L200 300 Z" fill="url(#logoGrad)" />
    <path d="M200 300 L320 80 L380 80 L280 300 Z" fill="#ffffff" opacity="0.9" />
    
    <!-- Nodes representing CRM relationships -->
    <circle cx="280" cy="300" r="32" fill="#38bdf8" />
    <circle cx="200" cy="300" r="16" fill="#ffffff" />
    
    <!-- Connection loop indicating database integration -->
    <path d="M120 300 C150 350, 250 350, 280 300 C250 320, 150 320, 120 300 Z" fill="#38bdf8" />
  </g>
</svg>